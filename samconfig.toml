version = 0.1

[default.global.parameters]
stack_name = "anonymous-chat"

[default.build.parameters]
cached = true
parallel = true

[default.deploy.parameters]
stack_name         = "anonymous-chat"
s3_prefix          = "anonymous-chat"
region             = "us-west-2"
confirm_changeset  = false
capabilities       = "CAPABILITY_IAM"
disable_rollback   = false
resolve_s3         = true
